<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kalkulator Dosis Anak RSUD Sekayu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-3">

<div class="container" style="max-width: 500px;">
    <div class="card shadow-sm p-4">
        <h4 class="text-primary text-center">Kalkulator Dosis Anak</h4>
        <div id="status" class="text-center fw-bold mb-3 text-warning">⏳ Memuat Data...</div>
        
        <input type="text" id="obat-search" class="form-control mb-2" placeholder="Ketik nama obat..." list="list-obat">
        <datalist id="list-obat"></datalist>
        
        <input type="number" id="input-bb" class="form-control mb-3" placeholder="Berat Badan (kg)">
        <button class="btn btn-primary w-100" onclick="hitung()">Hitung & Validasi</button>

        <div id="hasil" class="mt-4 p-3 border-start border-success border-5 bg-white d-none">
            <h6>Hasil Validasi Klinis:</h6>
            <div id="konten-hasil"></div>
        </div>
    </div>
</div>

<script>
let DB = {};
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRdXZ5pdBQnoLXRpGb9HWJcMsCAz0a3BRaVrks3vbN0AACeofM6u8MLh-dFYVhW8HjzrlonFGYdjeCo/pub?output=csv";

// Mengambil data
fetch(URL).then(res => res.text()).then(text => {
    let baris = text.split(/\r?\n/);
    for (let i = 1; i < baris.length; i++) {
        // Regex ini kunci perbaikannya: memisahkan kolom tanpa merusak isi yang mengandung koma
        let kolom = baris[i].match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
        if (!kolom || kolom.length < 6) continue;

        let nama = kolom[1]?.replace(/"/g, '').trim();
        let sediaan = kolom[2]?.replace(/"/g, '').trim();
        let kekuatan = kolom[3]?.replace(/"/g, '').trim();
        let key = `${nama} ${sediaan} ${kekuatan}`;
        
        DB[key] = {
            dosis: kolom[4]?.replace(/"/g, '').trim(),
            aturan: kolom[5]?.replace(/"/g, '').trim(),
            sumber: kolom[6]?.replace(/"/g, '').trim()
        };
        
        let opt = document.createElement('option');
        opt.value = key;
        document.getElementById('list-obat').appendChild(opt);
    }
    document.getElementById('status').innerHTML = "✅ Data Terhubung";
    document.getElementById('status').classList.replace('text-warning', 'text-success');
});

function hitung() {
    let kunci = document.getElementById('obat-search').value;
    let data = DB[kunci];
    if (!data) { alert("Obat tidak ditemukan!"); return; }
    
    document.getElementById('hasil').classList.remove('d-none');
    document.getElementById('konten-hasil').innerHTML = `
        <p><strong>Rentang Dosis:</strong> ${data.dosis}</p>
        <p><strong>Aturan Pakai:</strong> ${data.aturan}</p>
        <hr><small>Sumber: ${data.sumber}</small>
    `;
}
</script>
</body>
</html>
