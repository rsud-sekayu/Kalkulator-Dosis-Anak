<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Dosis Farmasi - RSUD Sekayu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        .result-box { border-left: 5px solid #0d6efd; background: #f8f9fa; }
        .emergency-box { border-left: 5px solid #dc3545 !important; background: #fff5f5 !important; }
    </style>
</head>
<body class="bg-light p-3">
<div class="container" style="max-width: 650px;">
    <div class="card p-4 shadow-sm border-0 rounded-4">
        <h4 class="text-primary text-center fw-bold mb-4">Kalkulator Dosis Farmasi</h4>
        
        <input type="text" id="obat-search" class="form-control form-control-lg mb-3" list="list-obat" placeholder="Cari obat (Paracetamol, Epinefrin, dll)...">
        <datalist id="list-obat"></datalist>
        
        <div class="row">
            <div class="col-md-6"><label>Berat Badan (kg)</label><input type="number" id="bb" class="form-control mb-3" step="0.1"></div>
            <div class="col-md-6"><label>Umur (th)</label><input type="number" id="umur" class="form-control mb-3"></div>
        </div>

        <div id="opsi-container" class="mb-3"></div>
        
        <button class="btn btn-primary btn-lg w-100" onclick="hitung()">Hitung Dosis</button>
        <div id="hasil" class="mt-4 p-3 d-none"></div>
    </div>
</div>

<script>
    let db = [];
    const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRdXZ5pdBQnoLXRpGb9HWJcMsCAz0a3BRaVrks3vbN0AACeofM6u8MLh-dFYVhW8HjzrlonFGYdjeCo/pub?output=csv";
    
    // Load Data
    Papa.parse(url, {download: true, header: true, complete: (res) => { 
        db = res.data; 
        const list = document.getElementById('list-obat');
        [...new Set(db.map(o => o["Nama Obat"]))].forEach(name => {
            let opt = document.createElement('option'); opt.value = name; list.appendChild(opt);
        });
    }});

    // Deteksi Pilihan Obat
    document.getElementById('obat-search').addEventListener('input', function() {
        const nama = this.value;
        const matches = db.filter(x => x["Nama Obat"] === nama);
        const container = document.getElementById('opsi-container');
        container.innerHTML = "";
        
        if (matches.length > 1) {
            let select = `<label>Pilih Indikasi/Sediaan:</label><select id="opsi-indikasi" class="form-select">`;
            matches.forEach((m, i) => select += `<option value="${i}">${m["Indikasi"] || "Standar"}</option>`);
            select += `</select>`;
            container.innerHTML = select;
        }
    });

    function hitung() {
        const nama = document.getElementById('obat-search').value;
        const bb = parseFloat(document.getElementById('bb').value);
        const idx = document.getElementById('opsi-indikasi') ? document.getElementById('opsi-indikasi').value : 0;
        const o = db.filter(x => x["Nama Obat"] === nama)[idx];
        
        if (!o || !bb) return alert("Lengkapi data!");

        const dMin = parseFloat(o["Dosis Min"]) * bb;
        const dMak = parseFloat(o["Dosis Mak"]) * bb;
        
        let hasil = document.getElementById('hasil');
        hasil.classList.remove('d-none');
        hasil.className = (nama.includes("Epinefrin") || nama.includes("Fenitoin")) ? "mt-4 p-3 result-box emergency-box" : "mt-4 p-3 result-box";
        
        hasil.innerHTML = `<h5>${o["Nama Obat"]}</h5>
            <p><strong>Dosis:</strong> ${dMin.toFixed(2)} - ${dMak.toFixed(2)} ${o["Satuan Dosis"]}<br>
            <strong>Cara Pakai:</strong> ${o["Aturan Pakai"]}</p>
            <div class="alert alert-warning small"><strong>Catatan Penting:</strong> ${o["Catatan Apoteker"] || "-"}</div>
            <small class="text-muted">Referensi: ${o["Sumber"]}</small>`;
    }
</script>
</body>
</html>
