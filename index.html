<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kalkulator Dosis Anak</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .card { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #28a745; color: white; cursor: pointer; }
        .hasil { margin-top: 20px; padding: 15px; background: #e8f5e9; border-left: 5px solid #28a745; }
        .dosis-besar { font-size: 24px; font-weight: bold; color: #d32f2f; }
    </style>
</head>
<body>
<div class="card">
    <h2>Kalkulator Dosis Anak</h2>
    <input type="text" id="obat" placeholder="Contoh: Paracetamol" list="daftar-obat">
    <datalist id="daftar-obat">
        <option value="Paracetamol">
        <option value="Amoxicillin">
    </datalist>
    <input type="number" id="bb" placeholder="Berat Badan (kg)">
    <button onclick="hitung()">Hitung Dosis</button>
    <div id="hasil" class="hasil" style="display:none;">
        <p>Aturan: <span id="aturan"></span></p>
        <p>Dosis: <span class="dosis-besar" id="dosis"></span></p>
        <p>Catatan: <span id="catatan"></span></p>
    </div>
</div>
<script>
    // Data dummy (ganti bagian ini dengan data dari CSV Anda)
    const db = { "Paracetamol": { aturan: "Tiap 4-6 jam", dosis: "5ml - 7.5ml", catatan: "Maksimal 5 dosis/hari" } };
    
    function hitung() {
        const nama = document.getElementById('obat').value;
        const hasil = db[nama];
        if(hasil) {
            document.getElementById('hasil').style.display = 'block';
            document.getElementById('aturan').innerText = hasil.aturan;
            document.getElementById('dosis').innerText = hasil.dosis;
            document.getElementById('catatan').innerText = hasil.catatan;
        } else { alert('Obat tidak ditemukan'); }
    }
</script>
</body>
</html>
