<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kalkulator Dosis RSUD Sekayu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        .result-box { border-left: 5px solid #198754; background: #fff; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body class="bg-light p-3">
<div class="container" style="max-width: 600px;">
    <div class="card p-4 shadow-sm">
        <h4 class="text-primary text-center">Kalkulator Dosis Anak</h4>
        <input type="text" id="obat-search" class="form-control mb-3" list="list-obat" placeholder="Ketik nama obat...">
        <datalist id="list-obat"></datalist>

        <div id="opsi-container" class="mb-3"></div>
        <label>Berat Badan (kg)</label><input type="number" id="bb" class="form-control mb-3" step="0.1">
        
        <button class="btn btn-primary w-100" onclick="hitung()">Hitung</button>
        <div id="hasil" class="mt-4 p-3 d-none result-box"></div>
    </div>
</div>

<script>
    let db = [];
    const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRdXZ5pdBQnoLXRpGb9HWJcMsCAz0a3BRaVrks3vbN0AACeofM6u8MLh-dFYVhW8HjzrlonFGYdjeCo/pub?output=csv";
    
    Papa.parse(url, {download: true, header: true, complete: (res) => { db = res.data; populateList(); }});

    function populateList() {
        const list = document.getElementById('list-obat');
        [...new Set(db.map(o => o["Nama Obat"]))].forEach(name => {
            let opt = document.createElement('option'); opt.value = name; list.appendChild(opt);
        });
    }

    // Deteksi Indikasi (untuk Dexamethasone, Epinefrin, dll)
    document.getElementById('obat-search').addEventListener('input', function() {
        const container = document.getElementById('opsi-container');
        const matches = db.filter(x => x["Nama Obat"] === this.value);
        container.innerHTML = "";
        if (matches.length > 1) {
            let select = `<label>Pilih Indikasi:</label><select id="opsi-indikasi" class="form-select">`;
            matches.forEach((m, i) => { if (m["Indikasi"]) select += `<option value="${i}">${m["Indikasi"]}</option>`; });
            select += `</select>`;
            container.innerHTML = select;
        }
    });

    function hitung() {
        const nama = document.getElementById('obat-search').value;
        const bb = parseFloat(document.getElementById('bb').value);
        const sel = document.getElementById('opsi-indikasi');
        const idx = sel ? sel.value : 0;
        const o = db.filter(x => x["Nama Obat"] === nama)[idx];
        
        if (!o || !bb) return alert("Lengkapi data!");

        const dMin = parseFloat(o["Dosis Min"]) * bb;
        const dMak = parseFloat(o["Dosis Mak"]) * bb;

        // Logika Pintar Cair vs Padat
        const kekuatan = o["Kekuatan Sediaan"].toLowerCase();
        let hasilTeks = "";

        if (kekuatan.includes("/") || kekuatan.includes("ml")) {
            // Ekstraksi mg dan ml (misal "120 mg/5 ml")
            const parts = kekuatan.match(/(\d+)\s*mg\s*\/\s*(\d+)\s*ml/);
            if (parts) {
                const vMin = (dMin / parts[1] * parts[2]).toFixed(1);
                const vMak = (dMak / parts[1] * parts[2]).toFixed(1);
                hasilTeks = `<strong>Dosis: ${vMin} - ${vMak} ml</strong>`;
            } else {
                hasilTeks = `<strong>Dosis: ${dMin.toFixed(1)} - ${dMak.toFixed(1)} mg</strong>`;
            }
        } else {
            hasilTeks = `<strong>Dosis: ${dMin.toFixed(0)} - ${dMak.toFixed(0)} mg</strong>`;
        }

        let h = document.getElementById('hasil');
        h.classList.remove('d-none');
        h.innerHTML = `<h5>${o["Nama Obat"]}</h5>
            <p>${hasilTeks}</p>
            <p><strong>Bentuk:</strong> ${o["Bentuk Sediaan"]} | <strong>Kekuatan:</strong> ${o["Kekuatan Sediaan"]}</p>
            <p><strong>Aturan Pakai:</strong> ${o["Aturan Pakai"]}</p>
            <div class="alert alert-info"><strong>Catatan Klinis:</strong><br>${o["Catatan Klinis"]}</div>
            <small class="text-muted">Referensi: ${o["Referensi"]}</small>`;
    }
</script>
</body>
</html>
