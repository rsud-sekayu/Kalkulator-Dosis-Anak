            { label: "Anak Kelompok Usia > 12 Tahun / Dewasa", teksHasil: "Rentang Rekomendasi: <b>5 ml s/d 10 ml</b>", tips: "Diberikan tiap 6-8 jam saat lambung kosong (1 jam sebelum makan)." }
        ]
    },
    "Laxadine Sirup": {
        tipe: "Flat",
        aturan: [
            { label: "Anak Kelompok Usia 6 - 12 Tahun", teksHasil: "Rentang Rekomendasi: <b>7.5 ml s/d 15 ml</b>", tips: "Diberikan sekali sehari pada malam hari menjelang tidur." },
            { label: "Anak Kelompok Usia > 12 Tahun / Dewasa", teksHasil: "Rentang Rekomendasi: <b>15 ml s/d 30 ml</b>", tips: "Diberikan sekali sehari pada malam hari menjelang tidur." }
        ]
    },
    "Asam Folat Tablet 1 mg": {
        tipe: "Flat",
        aturan: [
            { label: "Semua Kelompok Usia Anak / Dewasa", teksHasil: "Dosis Tetap: <b>1 Tablet (1 mg)</b>", tips: "Diberikan sekali sehari secara rutin harian." }
        ]
    }
};

// FUNGSI KONTROL INTEGRASI KETIK & MUNCUL OTOMATIS (SHOW / HIDE COLUMN)
function pantauPilihanObat() {
    const namaObat = document.getElementById('obat-search').value;
    const boxBB = document.getElementById('box-input-bb');
    const boxUmur = document.getElementById('box-input-umur');
    const boxFlat = document.getElementById('box-select-flat');
    const selectFlat = document.getElementById('select-kategori-flat');

    // Kosongkan menu kategori flat terlebih dahulu
    selectFlat.innerHTML = "";

    if (!DB_MASTER[namaObat]) return; // Lewati jika user belum selesai mengetik

    const obat = DB_MASTER[namaObat];

    if (obat.tipe === "Paracetamol") {
        // Parasetamol butuh BB untuk rumus matematika, dan Umur untuk deteksi ambang batas liver (<12th vs >12th)
        boxBB.classList.remove('d-none');
        boxUmur.classList.remove('d-none');
        boxFlat.classList.add('d-none');
    } else if (obat.tipe === "BB" || obat.tipe === "Emergency") {
        // Kelompok BB & Emergency murni hanya butuh BB, sembunyikan umur
        boxBB.classList.remove('d-none');
        boxUmur.classList.add('d-none');
        boxFlat.classList.add('d-none');
    } else if (obat.tipe === "Flat") {
        // Kelompok Flat (Sheet 2): Matikan kolom BB dan Umur biasa, gantikan dengan Dropdown Kategori
        boxBB.classList.add('d-none');
        boxUmur.classList.add('d-none');
        boxFlat.classList.remove('d-none');

        // Isi dropdown secara otomatis berdasarkan isi array database
        obat.aturan.forEach((item, index) => {
            let opt = document.createElement('option');
            opt.value = index;
            opt.innerText = item.label;
            selectFlat.appendChild(opt);
        });
    }
}

// LOGIKA INTI MATEMATIKA KALKULATOR MEDIS
function eksekusiKalkulatorDosis() {
    const namaObat = document.getElementById('obat-search').value;
    const bb = parseFloat(document.getElementById('input-bb').value);
    const umurInput = parseFloat(document.getElementById('input-umur').value);
    const satuanUmur = document.getElementById('satuan-umur').value;
    const indeksFlat = document.getElementById('select-kategori-flat').value;

    const areaHasil = document.getElementById('area-hasil-kalkulator');
    const detailHasil = document.getElementById('konten-detail-hasil');

    if (!DB_MASTER[namaObat]) { alert("Nama obat tidak valid! Mohon klik pilihan dari daftar yang muncul."); return; }

    const obat = DB_MASTER[namaObat];
    areaHasil.classList.remove('d-none');
    areaHasil.className = "hasil-box"; // Reset class css

    // FORMAT 1: ALUR DOSIS FLAT (SHEET 2)
    if (obat.tipe === "Flat") {
        areaHasil.classList.add('hasil-flat');
        const dataAturan = obat.aturan[indeksFlat];
        detailHasil.innerHTML = `
            <p class="mb-2"><strong>Metode Perhitungan:</strong> Dosis Flat (Sesuai Kategori Sheet 2)</p>
            <p class="mb-1"><strong>Rekomendasi Volume Pemberian:</strong></p>
            <h3 class="fw-bold text-info mb-3">${dataAturan.teksHasil}</h3>
            <div class="p-3 bg-light border rounded small">
                <strong>💡 Panduan Aturan Pakai Klinis:</strong><br><span class="text-muted">${dataAturan.tips}</span>
            </div>
        `;
        return;
    }

    // FORMAT 2: ALUR HIGH ALERT EMERGENCY (Bukan Rumus Standar)
    if (obat.tipe === "Emergency") {
        areaHasil.classList.add('hasil-emergency');
        if (!bb || bb <= 0) { alert("Untuk obat emergency, input Berat Badan wajib diisi!"); return; }
        detailHasil.innerHTML = `
            <p class="mb-2 text-danger"><strong>⚠️ PERINGATAN CRITICAL EMERGENCY:</strong></p>
            <p class="mb-3">Berat Badan Terinput: <b>${bb} kg</b>. Obat ini termasuk golongan <i>High Alert</i> dengan regimen dosis bertingkat/khusus.</p>
            <div class="p-3 bg-light border border-danger border-opacity-50 rounded small">
                <strong>📋 Protokol Penyiapan & Dosis (Acuan IDAI/DIH):</strong><br>
                <span class="text-dark font-monospace">${obat.catatan}</span>
            </div>
        `;
        return;
    }

    // Konversi otomatis input bulan ke tahun untuk penyelarasan threshold liver
    let umurTahun = umurInput;
    if (!isNaN(umurInput) && satuanUmur === "bulan") {
        umurTahun = umurInput / 12;
    }

    // FORMAT 3: ALUR PARACETAMOL (DOUBLE SCREENING LIVER - PERBAIKAN SATUAN SEDIAAN)
    if (obat.tipe === "Paracetamol") {
        if (!bb || bb <= 0) { alert("Input Berat Badan wajib diisi!"); return; }
        if (isNaN(umurInput) || umurInput < 0) { alert("Untuk Paracetamol, input Umur wajib diisi demi skrining toksisitas hati!"); return; }

        let limitHarian = (umurTahun < 12) ? obat.maksAnakHari : obat.maksDewasaHari;
        
        let mgMinKali = bb * obat.min;
        let mgMakKali = bb * obat.mak;
        let totalEstimasiHarian = mgMakKali * 4; // Asumsi frekuensi maksimal 4x sehari

        let terpotongOtomatis = false;
        if (totalEstimasiHarian > limitHarian) {
            mgMakKali = limitHarian / 4;
            terpotongOtomatis = true;
        }
        if (mgMakKali > obat.maksDewasaKali) mgMakKali = obat.maksDewasaKali;

        // --- Perbaikan Deteksi Satuan Sediaan Aktual ---
        const satuanSediaan = (obat.ml === 1) ? "Tablet" : "ml";
        
        // Hitung hasil fisik obat (jika tablet, akan menghitung berapa bagian tablet)
        const hasilMin = ((mgMinKali / obat.mg) * obat.ml).toFixed(1);
        const hasilMak = ((mgMakKali / obat.mg) * obat.ml).toFixed(1);

        let infoPotong = "";
        if (terpotongOtomatis) {
            infoPotong = `<div class="alert alert-danger py-2 mt-3 mb-0 small">
                ⚠️ <b>Dosis Dipotong Aman:</b> Total dosis harian melampaui batas organ liver anak usia <12 tahun. Dosis maksimum sekali minum dipotong otomatis menjadi <b>${mgMakKali.toFixed(0)} mg</b> (${limitHarian} mg/hari).
            </div>`;
        }

        detailHasil.innerHTML = `
            <p class="mb-2"><strong>Aturan Frekuensi:</strong> Sehari 3 s/d 4 kali (Tiap 4-6 jam jika demam)</p>
            <p class="mb-1"><strong>Jumlah Sekali Minum:</strong></p>
            <h3 class="fw-bold text-success mb-3">${hasilMin} ${satuanSediaan} <span class="text-muted fs-5">s/d</span> ${hasilMak} ${satuanSediaan}</h3>
            <p class="text-secondary small mb-1">Zat aktif aktual: ${mgMinKali.toFixed(0)} mg - ${mgMakKali.toFixed(0)} mg sekali minum.</p>
            <div class="p-2 bg-light border rounded small mt-2">
                <strong>💡 Catatan Apoteker:</strong><br><span class="text-muted">${obat.catatan}</span>
            </div>
            ${infoPotong}
        `;
        return;
    }

    // FORMAT 4: ALUR HITUNG BERBASIS BB STANDAR (SHEET 1)
    if (obat.tipe === "BB") {
        if (!bb || bb <= 0) { alert("Input Berat Badan wajib diisi!"); return; }
        
        let mgMinHari, mgMakHari;
        if (obat.jenis === "Per Hari - BB") {
            mgMinHari = bb * obat.min;
            mgMakHari = bb * obat.mak;
        } else {
            mgMinHari = (bb * obat.min) * obat.f;
            mgMakHari = (bb * obat.mak) * obat.f;
        }

        // Pengaman Batas Maksimal Harian dari Database
        if (obat.maksAnakHari > 0 && mgMakHari > obat.maksAnakHari) mgMakHari = obat.maksAnakHari;

        let mgMinKali = (obat.jenis === "Per Hari - BB") ? (mgMinHari / obat.f) : (bb * obat.min);
        let mgMakKali = (obat.jenis === "Per Hari - BB") ? (mgMakHari / obat.f) : (bb * obat.mak);

        // Konversi Zat Aktif Ke Bentuk Sediaan Cair/Padat Aktual
        const hasilMin = ((mgMinKali / obat.mg) * obat.ml).toFixed(1);
        const hasilMak = ((mgMakKali / obat.mg) * obat.ml).toFixed(1);
        const satuanSediaan = (obat.ml === 1) ? "Tablet/Kapsul" : "ml";

        detailHasil.innerHTML = `
            <p class="mb-2"><strong>Aturan Frekuensi:</strong> Sehari ${obat.f} kali</p>
            <p class="mb-1"><strong>Dosis Sekali Minum:</strong></p>
            <h3 class="fw-bold text-primary mb-3">${hasilMin} ${satuanSediaan} ${hasilMin !== hasilMak ? 's/d ' + hasilMak + ' ' + satuanSediaan : ''}</h3>
            <p class="text-secondary small mb-1">Dosis Zat Aktif: ${mgMinKali.toFixed(1)} mg - ${mgMakKali.toFixed(1)} mg sekali minum.</p>
            <p class="text-secondary small mb-3">Total Akumulasi Harian: ${mgMakHari.toFixed(0)} mg/hari.</p>
            <div class="p-2 bg-light border rounded small">
                <strong>💡 Catatan Klinis / Aturan Pakai:</strong><br><span class="text-muted">${obat.catatan}</span>
            </div>
        `;
    }
}
</script>
