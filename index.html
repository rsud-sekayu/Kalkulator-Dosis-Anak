<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Dosis Anak RSUD Sekayu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; padding-top: 30px; font-family: sans-serif; }
        .card-utama { border-radius: 16px; border: none; box-shadow: 0 10px 35px rgba(0,0,0,0.08); background: #ffffff; }
        .header-rs { background: linear-gradient(135deg, #0d6efd, #0a58ca); color: white; border-radius: 16px 16px 0 0; padding: 20px; }
        .btn-hitung { background: #0d6efd; color: white; font-weight: 600; border-radius: 8px; border: none; }
        .hasil-box { background-color: #ffffff; border-left: 6px solid #198754; padding: 20px; border-radius: 8px; margin-top: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); }
        .status-sync { font-size: 0.8rem; padding: 5px 10px; border-radius: 20px; display: inline-block; }
    </style>
</head>
<body>

<div class="container" style="max-width: 600px;">
    <div class="card card-utama mb-5">
        <div class="header-rs text-center">
            <h4 class="fw-bold m-0">Kalkulator Dosis Anak Pintar</h4>
            <div id="status-koneksi" class="status-sync bg-warning text-dark mt-2">⏳ Sinkronisasi...</div>
        </div>
        
        <div class="card-body p-4">
            <div class="mb-3">
                <label class="form-label">Ketik & Pilih Sediaan Obat</label>
                <input type="text" id="obat-search" class="form-control" list="daftar-obat-master" oninput="hitungDosis()">
                <datalist id="daftar-obat-master"></datalist>
            </div>
            <div class="mb-3">
                <label class="form-label">Berat Badan Pasien (kg)</label>
                <input type="number" id="input-bb" class="form-control" placeholder="Contoh: 15" oninput="hitungDosis()">
            </div>
            
            <div id="area-hasil" class="hasil-box d-none">
                <h5 class="fw-bold mb-3">📋 Hasil Validasi Klinis:</h5>
                <div id="konten-hasil"></div>
            </div>
        </div>
    </div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRdXZ5pdBQnoLXRpGb9HWJcMsCAz0a3BRaVrks3vbN0AACeofM6u8MLh-dFYVhW8HjzrlonFGYdjeCo/pub?output=csv";
let DB_MASTER = {};

// Ambil data
fetch(CSV_URL).then(res => res.text()).then(text => {
    let baris = text.split(/\r?\n/);
    let datalist = document.getElementById('daftar-obat-master');
    
    for (let i = 1; i < baris.length; i++) {
        let kolom = baris[i].split(',');
        if (kolom.length < 6) continue;

        let nama = kolom[1]?.trim();
        let key = `${nama} ${kolom[2]?.trim()} ${kolom[3]?.trim()}`;
        
        DB_MASTER[key] = {
            dosisTeks: kolom[4]?.trim(),
            aturanTeks: kolom[5]?.trim(),
            sumberTeks: kolom[6]?.trim()
        };
        
        let opt = document.createElement('option');
        opt.value = key;
        datalist.appendChild(opt);
    }
    document.getElementById('status-koneksi').className = "status-sync bg-success text-white mt-2";
    document.getElementById('status-koneksi').innerText = "✅ Data Siap";
});

function hitungDosis() {
    let key = document.getElementById('obat-search').value;
    let bb = document.getElementById('input-bb').value;
    let area = document.getElementById('area-hasil');
    
    if (DB_MASTER[key] && bb > 0) {
        area.classList.remove('d-none');
        document.getElementById('konten-hasil').innerHTML = `
            <p><strong>Jumlah Sekali Minum:</strong> (Hitungan Otomatis Muncul di Sini)</p>
            <div class="p-3 bg-light border rounded small">
                <strong>💡 Parameter Google Sheets:</strong><br>
                • <b>Rentang Dosis:</b> ${DB_MASTER[key].dosisTeks}<br>
                • <b>Aturan Pakai:</b> ${DB_MASTER[key].aturanTeks}<br>
                • <b>Sumber Pustaka:</b> ${DB_MASTER[key].sumberTeks}
            </div>
        `;
    } else {
        area.classList.add('d-none');
    }
}
</script>
</body>
</html>
