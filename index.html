<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kalkulator Dosis Anak</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .card { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background: #007bff; color: white; cursor: pointer; font-weight: bold; }
        .hasil { margin-top: 20px; padding: 15px; border-radius: 5px; background: #f9f9f9; display: none; }
        .dosis-val { font-size: 24px; font-weight: bold; color: #d9534f; display: block; margin: 5px 0; }
    </style>
</head>
<body>
<div class="card">
    <h2>Kalkulator Dosis Anak</h2>
    <input type="text" id="obat" list="list-obat" placeholder="Ketik nama obat...">
    <datalist id="list-obat">
        <option value="Paracetamol 120mg/5ml">
    </datalist>
    <input type="number" id="bb" placeholder="Berat badan (kg)">
    <button onclick="hitung()">Hitung Dosis</button>

    <div id="hasil" class="hasil">
        <p><strong>Aturan Frekuensi:</strong> <span id="aturan"></span></p>
        <p><strong>Dosis Sekali Minum:</strong> <span class="dosis-val" id="dosis"></span></p>
        <p><strong>Catatan Apoteker:</strong> <span id="catatan"></span></p>
    </div>
</div>

<script>
    // Contoh data (Tambahkan 55 obat Anda di sini)
    const database = {
        "Paracetamol 120mg/5ml": { 
            aturan: "Tiap 4-6 jam jika demam", 
            dosis: "5ml - 7.5ml", 
            catatan: "Maksimal 5 dosis/hari. Anak <12 tahun maks 2.6 gram/hari, anak >12 tahun maks 4 gram/hari." 
        }
    };

    function hitung() {
        const nama = document.getElementById('obat').value;
        const data = database[nama];
        if(data) {
            document.getElementById('hasil').style.display = 'block';
            document.getElementById('aturan').innerText = data.aturan;
            document.getElementById('dosis').innerText = data.dosis;
            document.getElementById('catatan').innerText = data.catatan;
        } else { alert("Obat tidak ditemukan"); }
    }
</script>
</body>
</html>
