<script>
    let db = [];
    const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRdXZ5pdBQnoLXRpGb9HWJcMsCAz0a3BRaVrks3vbN0AACeofM6u8MLh-dFYVhW8HjzrlonFGYdjeCo/pub?output=csv";
    
    Papa.parse(url, {download: true, header: true, complete: (res) => { db = res.data; populateList(); }});

    function populateList() {
        const list = document.getElementById('list-obat');
        [...new Set(db.map(o => o["Nama Obat"]))].forEach(name => {
            let opt = document.createElement('option'); opt.value = name; list.appendChild(opt);
        });
    }

    function hitung() {
        const nama = document.getElementById('obat-search').value;
        const bb = parseFloat(document.getElementById('bb').value);
        const o = db.find(x => x["Nama Obat"] === nama);
        if (!o || !bb) return alert("Lengkapi data!");

        // 1. Hitung Dosis Sekali Minum (mg)
        const dMin = parseFloat(o["Dosis Min"]) * bb;
        const dMak = parseFloat(o["Dosis Mak"]) * bb;
        
        // 2. Logika Deteksi Cair (mg/ml atau mg/5ml) vs Padat (mg)
        let tampilanDosis = "";
        const kekuatan = o["Kekuatan Sediaan"]; // Contoh: "120 mg/5 ml" atau "500 mg"
        const angkaKekuatan = parseFloat(kekuatan); // Mengambil angka pertama (misal: 120 atau 500)
        
        // Cek apakah ada informasi volume di kolom Kekuatan Sediaan
        if (kekuatan.toLowerCase().includes("ml")) {
            // Jika cair, cari angka volumenya
            const volMatch = kekuatan.match(/\/\s*(\d+)/);
            const volume = volMatch ? parseFloat(volMatch[1]) : 1; 
            const vMin = (dMin / angkaKekuatan * volume).toFixed(1);
            const vMak = (dMak / angkaKekuatan * volume).toFixed(1);
            tampilanDosis = `<span class="text-success fw-bold fs-3">${vMin} ml s/d ${vMak} ml</span>`;
        } else {
            // Jika padat (tablet), tampilkan dalam mg
            tampilanDosis = `<span class="text-success fw-bold fs-3">${dMin.toFixed(0)} mg s/d ${dMak.toFixed(0)} mg</span>`;
        }

        document.getElementById('hasil').classList.remove('d-none');
        document.getElementById('hasil').innerHTML = `
            <h5>📋 Hasil Validasi Klinis:</h5>
            <p class="mb-1"><strong>Obat:</strong> ${o["Nama Obat"]} <br> 
            <small class="text-muted">${o["Bentuk Sediaan"]} (${o["Kekuatan Sediaan"]})</small></p>
            <p><strong>Aturan Frekuensi:</strong> ${o["Aturan Pakai"]}</p>
            <p><strong>Jumlah Sekali Minum:</strong><br>
            ${tampilanDosis}</p>
            <small>Zat aktif aktual: ${dMin.toFixed(0)} mg - ${dMak.toFixed(0)} mg sekali minum.</small>
            
            <div class="bg-light p-3 mt-3 rounded">
                <strong>💡 Catatan Apoteker:</strong><br>${o["Catatan Klinis"]}
            </div>
            <div class="mt-2 text-muted small">
                <strong>Referensi:</strong> ${o["Sumber"]}
            </div>`;
    }
</script>
