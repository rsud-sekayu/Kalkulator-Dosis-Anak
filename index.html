<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kalkulator Dosis Anak</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; }
        .result { margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 5px; }
        .dosage { font-size: 1.5em; font-weight: bold; color: #d9534f; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Kalkulator Dosis Anak</h2>
        <input type="text" id="obat" placeholder="Ketik nama obat..." list="obat-list">
        <datalist id="obat-list"></datalist>
        <input type="number" id="berat" placeholder="Berat badan (kg)">
        <input type="number" id="umur" placeholder="Umur">
        <select id="satuan-umur"><option value="bulan">Bulan</option><option value="tahun">Tahun</option></select>
        <button onclick="hitung()">Hitung Dosis</button>
        <div id="hasil" class="result" style="display:none;">
            <p><strong>Aturan Pakai:</strong> <span id="aturan"></span></p>
            <p><strong>Dosis Sekali Minum:</strong> <span class="dosage" id="dosis"></span></p>
            <p><strong>Setara Zat Aktif:</strong> <span id="zat-aktif"></span></p>
            <p><strong>Catatan Apoteker:</strong> <span id="catatan"></span></p>
        </div>
    </div>
    <script>
        // Logika aplikasi akan membaca dari file CSV/JSON yang diintegrasikan
        function hitung() {
            document.getElementById('hasil').style.display = 'block';
            // Placeholder logika perhitungan
            document.getElementById('dosis').innerText = "5 ml - 7.5 ml";
        }
    </script>
</body>
</html>
